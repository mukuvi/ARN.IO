services:
  frontend:
    image: mukuvi/arn-frontend:v1
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      - backend

  backend:
    image: mukuvi/arn-backend:v1
    ports:
      - "${BACKEND_PORT}:3001"
    environment:
      - PG_HOST=${PG_HOST}
      - PG_PORT=${PG_PORT}
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_DATABASE=${PG_DATABASE}
      - DATABASE_URL=${DATABASE_URL}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - ALLOWED_ORIGINS=http://localhost:${FRONTEND_PORT}
